# Database Configuration
# Configure your database connection details here

# Microsoft SQL Server Database (SQL Express - Local)
# Using SQL Server Authentication with sa user
# Using TCP protocol with port 1433 (default) - direct connection without SQL Server Browser
jdbc.url=jdbc:sqlserver://OMAR:1433;databaseName=bank_management_system;encrypt=true;trustServerCertificate=true
jdbc.user=sa
jdbc.password=12345678
jdbc.driver=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection Pool Settings (HikariCP)
hikari.maximumPoolSize=10
hikari.minimumIdle=2
hikari.idleTimeout=300000
hikari.maxLifetime=1200000
hikari.connectionTimeout=30000
